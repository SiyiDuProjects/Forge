<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forge</title>
    <link rel="stylesheet" href="styles.css?v=forge-generator-v7" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="project-sidebar" aria-label="Forge 导航">
        <nav class="primary-nav" aria-label="项目操作">
          <button class="new-project-button" id="newProject" type="button">
            <span class="nav-icon">+</span>
            <span>新项目</span>
          </button>
        </nav>

        <div class="project-group">
          <div class="project-head">
            <span class="sidebar-label">项目</span>
            <button class="project-menu-button" id="openThreadMenu" type="button" aria-label="原型菜单">...</button>
          </div>
          <div class="thread-list" aria-label="ProductPlan 项目"></div>
        </div>

        <div class="sidebar-footer">
          <button class="footer-row" id="openSettings" type="button">
            <span class="gear-icon" aria-hidden="true">⚙</span>
            <span>Forge 设置</span>
          </button>
          <span id="apiStatus" class="api-status"></span>
        </div>
      </aside>

      <main class="thread-shell">
        <header class="thread-topbar">
          <div class="topbar-title">
            <strong id="topbarTitle">未命名硬件项目</strong>
            <span id="draftStatus" hidden></span>
          </div>
          <div class="topbar-actions">
            <button class="compact-button" id="copySpec" type="button">预览原型快照</button>
            <button class="compact-button primary" id="submitReview" type="button">提交审核下单</button>
          </div>
        </header>

        <section class="conversation" aria-label="工作台内容">
          <div id="workspaceView" class="conversation-inner workspace-view" aria-live="polite"></div>
        </section>

        <form id="promptForm" class="composer" aria-label="硬件需求输入框">
          <div class="goal-strip">
            <span class="goal-dot"></span>
            <span id="composerSummary" class="goal-text">描述硬件需求，发送后更新 ProductPlan 和 3D 生成状态</span>
            <span id="scopeLevel" class="goal-meta">标准桌面屏</span>
          </div>

          <textarea id="ideaInput" rows="3" spellcheck="true"></textarea>

          <div class="composer-toolbar">
            <button id="runChain" class="send-button" type="submit" aria-label="发送需求并更新方案">
              <span></span>
            </button>
          </div>
        </form>
      </main>

      <aside class="inspector" aria-label="原型输出检查器">
        <div id="inspectorContent" class="inspector-content"></div>
      </aside>
    </div>

    <div id="floatingLayer" class="floating-layer" hidden>
      <section class="floating-card settings-dialog" data-dialog="settings" hidden aria-label="Forge 设置">
        <div class="floating-head">
          <strong>Forge 设置</strong>
          <button class="close-floating" type="button" aria-label="关闭 Forge 设置">x</button>
        </div>
        <div class="settings-grid">
          <nav class="settings-nav" aria-label="设置分区">
            <button class="active" type="button" data-settings-tab="studio">工作室</button>
            <button type="button" data-settings-tab="language">语言</button>
          </nav>
          <div class="settings-content">
            <section class="settings-panel" data-settings-panel="studio">
              <label class="settings-row">
                <span>
                  <strong>内部原型模式</strong>
                  <small>提交只生成本地人工审核资料，不付款、不生产、不接供应商。</small>
                </span>
                <input type="checkbox" checked />
              </label>
              <label class="settings-row">
                <span>
                  <strong>对话优先</strong>
                  <small>用户持续聊天，右侧 ProductPlan 实时更新。</small>
                </span>
                <input type="checkbox" checked />
              </label>
              <label class="settings-row">
                <span>
                  <strong>标准 3D 打印外壳</strong>
                  <small>木纹、鼠尾草绿、石墨黑都只是标准外壳的表面效果。</small>
                </span>
                <input type="checkbox" checked />
              </label>
              <label class="settings-row">
                <span>
                  <strong>结果预览优先</strong>
                  <small>3D 视图用于理解原型结果，不提供建模编辑工具。</small>
                </span>
                <input type="checkbox" checked />
              </label>
              <label class="settings-row">
                <span>
                  <strong>运行模式</strong>
                  <small>默认使用本地 Forge 工具链；需要真实 Codex 时手动切换。</small>
                </span>
                <select id="runtimeProviderSelect" aria-label="运行模式">
                  <option value="mock" selected>本地 Forge</option>
                  <option value="forge-query-engine">Forge QueryEngine</option>
                  <option value="codex">Codex</option>
                </select>
              </label>
            </section>

            <section class="settings-panel" data-settings-panel="language" hidden>
              <label class="settings-row">
                <span>
                  <strong>界面语言</strong>
                  <small>保留中文和 English 两套文案。</small>
                </span>
                <select id="languageSelect" aria-label="界面语言">
                  <option value="zh" selected>简体中文</option>
                  <option value="en">English</option>
                </select>
              </label>
              <label class="settings-row">
                <span>
                  <strong>文案维护规则</strong>
                  <small>新增按钮、状态、弹窗、文档都要同步更新中英文。</small>
                </span>
                <input type="checkbox" checked disabled />
              </label>
            </section>
          </div>
        </div>
      </section>

      <section class="floating-card mini-popover thread-popover" data-dialog="thread" hidden aria-label="原型菜单">
        <button type="button" data-action="rename">重命名原型</button>
        <button type="button" data-action="history">查看版本记录</button>
        <button type="button" data-action="duplicate">复制场景</button>
        <button type="button" data-action="export">导出原型方案预览</button>
        <button type="button" data-action="archive">归档草稿</button>
      </section>

      <section class="floating-card review-contact-dialog" data-dialog="reviewContact" hidden aria-label="提交审核下单">
        <div class="floating-head">
          <strong>提交审核下单</strong>
          <button class="close-floating" type="button" aria-label="关闭提交审核">x</button>
        </div>
        <div class="review-contact-fields">
          <label class="contact-row">
            <span id="reviewContactNameLabel">姓名</span>
            <input type="text" autocomplete="name" data-contact-field="name" />
          </label>
          <label class="contact-row">
            <span id="reviewContactEmailLabel">邮箱</span>
            <input type="email" autocomplete="email" data-contact-field="email" />
          </label>
          <p id="reviewContactHint" class="section-note">内部版只收姓名和邮箱，用于人工审核后联系。</p>
          <button id="confirmReviewSubmit" class="full-button" type="button" data-review-submit>生成本地审核资料</button>
        </div>
      </section>

      <section class="floating-card model-fullscreen-dialog" data-dialog="modelFullscreen" hidden aria-label="3D 预览全屏">
        <div class="model-fullscreen-head">
          <span>
            <strong id="modelFullscreenTitle">原型结构预览（3D）</strong>
            <small id="modelFullscreenStatus">3D 模型已生成</small>
          </span>
          <button class="model-fullscreen-exit close-floating" type="button" aria-label="收起全屏预览">
            <span aria-hidden="true">⛶</span>
          </button>
        </div>
        <div class="model-fullscreen-body">
          <div class="model-fullscreen-canvas-wrap">
            <span class="preview-engine-badge" data-model-render-status="fullscreen">真实 3D 预览已加载</span>
            <canvas data-device-canvas="fullscreen" data-preview-id="fullscreen" data-preview-engine="canvas2d" width="1280" height="760" aria-label="原型结构预览（3D）"></canvas>
          </div>
          <div id="modelFullscreenControls" class="model-fullscreen-controls"></div>
        </div>
      </section>

      <section class="floating-card detail-popover" data-dialog="dfm" hidden aria-label="生产可行性等级（DFM）">
        <div id="dfmPopover"></div>
      </section>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "/vendor/three/three.module.js",
          "three/addons/": "/vendor/three/addons/"
        }
      }
    </script>
    <script type="module" src="app.js?v=forge-generator-v7"></script>
  </body>
</html>
