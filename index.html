<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Y 工作台</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="project-sidebar" aria-label="Y 工作台导航">
        <div class="mac-controls" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <nav class="primary-nav" aria-label="工作台视图">
          <button class="nav-row active" type="button" data-view="chat">
            <span class="nav-icon">+</span>
            <span>对话生成</span>
          </button>
          <button class="nav-row" id="showModules" type="button" data-view="history">
            <span class="nav-icon">#</span>
            <span>项目历史</span>
          </button>
          <button class="nav-row" id="showReview" type="button" data-view="review">
            <span class="nav-icon">></span>
            <span>审核包</span>
          </button>
        </nav>

        <div class="project-group">
          <span class="sidebar-label">内部草稿</span>
          <div class="project-row open" aria-label="当前工作台">
            <span class="folder-icon"></span>
            <span>Y 实验室</span>
          </div>

          <div class="thread-list" aria-label="ProductPlan 草稿">
            <button class="thread-row active" type="button" data-history="current">
              <span>
                <strong>木纹桌面屏</strong>
                <small>标准 3D 打印外壳</small>
              </span>
              <em>r1</em>
            </button>
            <button class="thread-row" type="button" data-history="manual">
              <span>
                <strong>人工扩展草案</strong>
                <small>非标准产品内部评估</small>
              </span>
              <em>hold</em>
            </button>
          </div>
        </div>

        <div class="sidebar-footer">
          <button class="footer-row" id="openSettings" type="button">
            <span class="gear-icon"></span>
            <span>工作台设置</span>
          </button>
          <span id="apiStatus" class="api-status">界面原型</span>
        </div>
      </aside>

      <main class="thread-shell">
        <header class="thread-topbar">
          <button class="topbar-menu" id="openThreadMenu" type="button" aria-label="原型菜单">...</button>
          <div class="topbar-title">
            <strong id="topbarTitle">Y 工作台</strong>
            <span id="draftStatus">完整界面流程</span>
          </div>
          <div class="topbar-actions">
            <button class="compact-button" id="copySpec" type="button">预览方案快照</button>
            <button class="compact-button primary" id="submitReview" type="button">提交审核下单</button>
          </div>
        </header>

        <section class="conversation" aria-label="工作台内容">
          <div id="workspaceView" class="conversation-inner workspace-view" aria-live="polite"></div>
        </section>

        <form id="promptForm" class="composer" aria-label="模拟原型输入框">
          <div class="goal-strip">
            <span class="goal-dot"></span>
            <span id="composerSummary" class="goal-text">持续对话会更新右侧 ProductPlan、零件、模型占位、估算和审核状态</span>
            <span id="scopeLevel" class="goal-meta">标准桌面屏</span>
          </div>

          <textarea id="ideaInput" rows="3" spellcheck="true"></textarea>

          <div class="composer-toolbar">
            <button id="openAttach" type="button" class="toolbar-icon" aria-label="添加原型输入">+</button>
            <button id="openScope" type="button" class="toolbar-chip">范围</button>
            <button id="openBom" type="button" class="toolbar-chip">零件</button>
            <button id="openGuardrails" type="button" class="toolbar-chip">风险</button>
            <button id="openDfm" type="button" class="toolbar-chip">模型</button>

            <button id="runChain" class="send-button" type="submit" aria-label="运行模拟原型链路">
              <span></span>
            </button>
          </div>
        </form>
      </main>

      <aside class="inspector" aria-label="原型输出检查器">
        <div id="inspectorContent" class="inspector-content"></div>
      </aside>
    </div>

    <div id="floatingLayer" class="floating-layer" hidden>
      <section class="floating-card settings-dialog" data-dialog="settings" hidden aria-label="工作台设置">
        <div class="floating-head">
          <strong>工作台设置</strong>
          <button class="close-floating" type="button" aria-label="关闭工作台设置">x</button>
        </div>
        <div class="settings-grid">
          <nav class="settings-nav" aria-label="设置分区">
            <button class="active" type="button" data-settings-tab="studio">工作室</button>
            <button type="button" data-settings-tab="language">语言</button>
          </nav>
          <div class="settings-content">
            <section class="settings-panel" data-settings-panel="studio">
              <label class="settings-row">
                <span>
                  <strong>内部原型模式</strong>
                  <small>提交只生成本地人工审核包，不付款、不生产、不接供应商。</small>
                </span>
                <input type="checkbox" checked />
              </label>
              <label class="settings-row">
                <span>
                  <strong>对话优先</strong>
                  <small>用户持续聊天，右侧 ProductPlan 实时更新。</small>
                </span>
                <input type="checkbox" checked />
              </label>
              <label class="settings-row">
                <span>
                  <strong>标准 3D 打印外壳</strong>
                  <small>木纹、鼠尾草绿、石墨黑都只是标准外壳的表面效果。</small>
                </span>
                <input type="checkbox" checked />
              </label>
              <label class="settings-row">
                <span>
                  <strong>生成能力占位</strong>
                  <small>3D、电子布局和 AI provider 都通过 job 接口预留。</small>
                </span>
                <input type="checkbox" checked />
              </label>
            </section>

            <section class="settings-panel" data-settings-panel="language" hidden>
              <label class="settings-row">
                <span>
                  <strong>界面语言</strong>
                  <small>保留中文和 English 两套文案。</small>
                </span>
                <select id="languageSelect" aria-label="界面语言">
                  <option value="zh" selected>简体中文</option>
                  <option value="en">English</option>
                </select>
              </label>
              <label class="settings-row">
                <span>
                  <strong>文案维护规则</strong>
                  <small>新增按钮、状态、弹窗、文档都要同步更新中英文。</small>
                </span>
                <input type="checkbox" checked disabled />
              </label>
            </section>
          </div>
        </div>
      </section>

      <section class="floating-card mini-popover thread-popover" data-dialog="thread" hidden aria-label="原型菜单">
        <button type="button" data-action="rename">重命名原型</button>
        <button type="button" data-action="duplicate">复制场景</button>
        <button type="button" data-action="export">导出原型方案预览</button>
        <button type="button" data-action="archive">归档草稿</button>
      </section>

      <section class="floating-card mini-popover" data-dialog="attach" hidden aria-label="添加原型输入">
        <button type="button" data-action="sketch">产品草图</button>
        <button type="button" data-action="reference">参考产品</button>
        <button type="button" data-action="constraints">约束说明</button>
        <button type="button" data-action="behavior">设备行为</button>
      </section>

      <section class="floating-card detail-popover" data-dialog="scope" hidden aria-label="MVP 范围">
        <div id="scopePopover"></div>
      </section>

      <section class="floating-card detail-popover" data-dialog="bom" hidden aria-label="零件清单（BOM）">
        <div id="bomPopover"></div>
      </section>

      <section class="floating-card detail-popover" data-dialog="guardrails" hidden aria-label="风险限制">
        <div id="guardrailsPopover"></div>
      </section>

      <section class="floating-card detail-popover" data-dialog="dfm" hidden aria-label="生产可行性等级（DFM）">
        <div id="dfmPopover"></div>
      </section>
    </div>

    <script src="app.js?v=y-workbench-productplan-v1"></script>
  </body>
</html>
